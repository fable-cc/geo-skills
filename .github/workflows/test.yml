name: GEO Skills CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check — geo_rewrite.py
        run: python3 -m py_compile geo_rewrite.py

      - name: Dry-run validation — geo_rewrite.py
        run: python3 geo_rewrite.py --input geo-annotated-demo.md --dry-run
